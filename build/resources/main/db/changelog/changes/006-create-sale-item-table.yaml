databaseChangeLog:
  - changeSet:
      id: 006-create-sale-item-table
      author: api-commerce
      changes:
        - createTable:
            tableName: sale_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sale_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: unit_cost
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: discount
                  type: DECIMAL(5, 2)
                  defaultValueNumeric: 0
              - column:
                  name: subtotal
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: sale_items
            baseColumnNames: sale_id
            referencedTableName: sales
            referencedColumnNames: id
            constraintName: fk_sale_item_sale
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: sale_items
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_sale_item_product
        - createIndex:
            indexName: idx_sale_item_sale
            tableName: sale_items
            columns:
              - column:
                  name: sale_id

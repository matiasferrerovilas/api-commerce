databaseChangeLog:
  - changeSet:
      id: 005-create-sale-table
      author: api-commerce
      changes:
        - createTable:
            tableName: sales
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: total_cost
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: VARCHAR(500)
              - column:
                  name: workspace_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: sales
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_sale_user
        - createIndex:
            indexName: idx_sale_workspace
            tableName: sales
            columns:
              - column:
                  name: workspace_id
        - createIndex:
            indexName: idx_sale_date
            tableName: sales
            columns:
              - column:
                  name: date

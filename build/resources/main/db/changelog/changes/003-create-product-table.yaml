databaseChangeLog:
  - changeSet:
      id: 003-create-product-table
      author: api-commerce
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: VARCHAR(50)
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: cost
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: workspace_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_product_category
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_product_created_by
        - createIndex:
            indexName: idx_product_workspace
            tableName: products
            columns:
              - column:
                  name: workspace_id
        - createIndex:
            indexName: idx_product_sku
            tableName: products
            columns:
              - column:
                  name: sku
